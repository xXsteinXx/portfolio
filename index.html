[],"data":{"alignment":"justify"}},{"key":"e42or","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{"alignment":"justify"}},{"key":"3jbut","text":"In my downtime I enjoy playing and making video games, drawing, creating costumes, seeing live music, and collecting art prints for my apartment walls.","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{"alignment":"justify"}}],"entityMap":{}}}},"position":{"x":0,"y":7,"h":450,"w":12,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"private":false},"styles":{"version":"v2","fontFamily":"Merriweather","fontSize":19,"color":"#E0E0E0","textAlign":"justify","name":{"fontSize":40},"padding":35,"link":{"color":"#337ab7"},"linkHover":{"color":"#337ab7"},"backgroundColor":{"backgroundColor":"#000000","opacity":0.71},"backgroundImage":{"backgroundAttachment":"fixed","opacity":1}},"classes":[]}],"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"contentBackgroundColor":{"backgroundColor":"#E0E0E0","opacity":0},"name":{"fontSize":30,"textAlign":"left","color":"rgb(250, 250, 250)","fontFamily":"Montserrat"},"contentBackgroundImage":{},"version":"v2","slideBackgroundColor":{"backgroundColor":"#000000","opacity":0},"slideBackgroundImage":{"backgroundImage":"files/1920-dcdTqhQwRhKz0nkmMWSk.jpg","backgroundAttachment":"scroll","backgroundSize":"cover"}}},{"id":91240481,"pageId":77619781,"portfolioId":4733966,"isDraft":false,"name":null,"order":13,"isHeader":false,"isHidden":false,"modules":[{"id":286563362,"sourceId":0,"pageId":77619781,"slideId":91240481,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"dsf9i","text":"Contact: esteiner@pratt.edu | Master's in Library and Information Science","type":"unstyled","depth":0,"i t":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"93ud8","text":"Methodology: For this project, I researched the history of American radio as foundational information while specifically focusing on NYC radio history. The timeline was what I spent most of my time on as I find it paramount to include some level of interaction in a website to engage users. To avoid overwhelming viewers with information, I, along with the input of my group members, decided which historical instances would be engaging and informative for our audience. Creating the timeline involved summarizing historical information and finding relevant, Creative Commons (CC) image assets for visual interest. There are a limited number of images relating to NYC radio available to the public, possibly due to strict copyright or the nature of radio being an audio medium. I chose to source and credit images that were at least closely related to the event and from the same period, maintaining a use of only CC images as we prioritized open access. I included five books on specific aspects of radio history with their respective WorldCat links so users could find the closest borrowable copy and three archives containing NYC based broadcasts so that users could listen to primary sources. I organized my page to show information in its smallest form (the timeline) to the option to find a book that would dive deeper then finally to primary source materials in large digital archives. This small-to-large structure allows users to access information at their own pace without overwhelming them as soon as they reach the page.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":1533,"style":"FONT_NAME_Merriweather"},{"offset":0,"length":13,"style":"BOLD"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":1148,"h":505,"w":12,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPro ackgroundColor":"#333","backgroundOpacity":60,"pdfViewerScale":"page-width","embed":{"backgroundColor":{"backgroundColor":"#fff","opacity":1},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}}}}],"settings":{"layoutType":"thumbDot","autoPlay":true,"playSpeed":5,"backgroundColor":"","backgroundOpacity":100,"displayPlayButton":true,"displayGridView":true,"displayFullScreenMode":true}}},"position":{"x":0,"y":422,"h":827,"w":12,"minH":827,"autoHeight":false,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","name":{"fontSize":40}},"classes":[]},{"id":286563379,"sourceId":0,"pageId":77619784,"slideId":91240486,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"bjirf","text":"Methodology: Once I received the letter, I created a rough outline to structure my research, which I would add to as I learned more about each topic. The information provided for inmates submitting to PLSN did not need to be in our own words, so much of the information was copy-pasted from websites I found. My role was to organize that research, culling it down to the most relevant parts, and add definitions or images as needed so that there was a natural flow of information for the reference client to follow. My sources included the U.S. Small Business Administration website, Medium, manufacturing company websites, ProPublica, and more. I chose sources written by journalists or experts in the specific fields related to each letter’s topic.","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":750,"style":"FONT_NAME_Merriweather"},{"offset":0,"length":13,"style":"BOLD"},{"offset":584,"length":6,"style":"ITALIC"},{"offset":624,"length":10,"style":"ITALIC"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":1259,"h":287,"w":12,"autoHeight":tr all bottle recycling company in New York City along with information on promising technologies or equipment, how AI is applied to bottle recycling, and possible add-ons to an existing company. The second letter asked for information regarding states’ use of algorithms for monitoring inmates and their influence on parole. The third letter asked for information on the history of Unix and Unix-like operating systems, such as Linux, with a focus on timelines, key players, and variants, and a primer on pseudocoding with keywords and instructions as the submitter was planning on teaching a coding course for fellow inmates. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":919,"style":"FONT_NAME_Merriweather"},{"offset":0,"length":21,"style":"BOLD"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":0,"h":412,"w":12,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#E0E0E0","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equation":{"fontSize":"","color":"","borderColor":"","backgroundColor":"","padding":0},"link":{"fontFamily":"","fontSize":"","color":"#337ab7","padding":0,"textDecoration":""},"linkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"decimal","padding":0},"backgroundColor":{"backgroundColor":"#212121","opacity":1},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}},"classes":[]}],"prompt":{},"settings":{"displ "type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"a9smu","text":"Methodology: As someone who is highly critical of AI, I wanted to be completely transparent about how I view and used an LLM. I provide all of my data, fine-tuned models, and outputs on my GitHub and use the website to showcase all of the code I wrote, my explanation for the purpose of the project, and my critiques. I also link any relevant further reading, tools, and Python libraries. I believe my audience to be possibly unfamiliar with Adventure Time but familiar with Python and general information about AI. In my code blocks, I wrote out what each block is meant to do so the viewer can follow along. To begin the process of training, I first scraped the Adventure Time Wiki to download the transcripts. I then removed superfluous elements as well as changed the transcript format of “[character] : ‘[words]’” to “[character] says ‘[words]’” so the text made grammatical sense to the model. Once the data was downloaded and cleaned, I fine-tuned the GPT-2 model on the first and final season transcripts separately to create two models that I could save on my personal computer. After saving the models, there was no need to connect to the internet to perform the prompting and the model did not use a significant amount of my laptop’s battery. As I was developing sentence prompts to generate text about Finn, I decided to also create sentence prompts to analyze gender bias (“a man is”, “a woman is”, “a person is”) as a sort of litmus test for the quality of the generated sentences. At the end of the page, I analyze the merits and drawbacks of using a small, fine-tuned model for textual analysis. I used the github.dev tool with a prebuilt theme to turn my work into an accessible website","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":1703,"style":"FONT_NAME_Merriweather"},{"offset":0,"length":11,"style":"BOLD"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":1433,"h":532,"w":12,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#E0E0E0","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equation":{"fontSize":"","color":"","borderColor":"","backgroundColor":"","padding":0},"link":{"fontFamily":"","fontSize":"","color":"#337ab7","padding":0,"textDecoration":""},"linkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"decimal","padding":0},"backgroundColor":{"backgroundColor":"#212121","opacity":1},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}},"classes":[]},{"id":286563382,"sourceId":0,"pageId":77619785,"slideId":91240488,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"6e2og","text":"Fine-tuned Models as a Tool for Character Analysis","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":50,"style":"FONT_NAME_Cutive Mono"},{"offset":0,"length":50,"style":"FONT_SIZE_30"},{"offset":0,"length":50,"style":"BOLD"}],"entityRanges":[],"data":{"alignment":"justify"}},{"key":"4g7f8","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"elad7","text":"Project Description: A public website created using GitHub Pages and Python that acts as a guide, example, showcase, and analysis for fine-tuning a pre-trained Large Language Model (LLM) for a specific task. In this case, creating a fine-tuned model for both the first and final season of the acclaimed Cartoon Network series, Adventure Time, to analyze the character growth of the main character, Finn the Human. I am quite familiar with the series and know that Finn developed greatly as a character so my goal was to see if a small, fine-tuned model could display that growth. This project showcases my proficiency with Python, complex thoughts on the use of AI, and my desire to make information and tools as accessible as possible. By using a series like Adventure Time, which is popular among the Gen Z and Millennial population, I hope to draw in a younger/early career crowd to consider creative uses of machine learning and AI outside of generating a script, animation, or an artwork, while maintaining a critical but not abstinent lens. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":1047,"style":"FONT_NAME_Merriweather"},{"offset":0,"length":20,"style":"BOLD"},{"offset":760,"length":14,"style":"ITALIC"}],"entityRanges":[],"data":{}},{"key":"2mqmd","text":"","type":"unstyled","depth":0,"inlineStyleRanges":[],"entityRanges":[],"data":{}},{"key":"8d12q","text":"Please click the image or follow this link to access the site. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":63,"style":"FONT_NAME_Merriweather"}],"entityRanges":[{"offset":33,"length":10,"key":0}],"data":{"alignment":"center"}}],"entityMap":{"0":{"type":"LINK","mutability":"MUTABLE","data":{"url":"https://xxsteinxx.github.io/chara-analysis_at/","target":"_blank"}}}}}},"position":{"x":0,"y":0,"h":493,"w":12,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#E0E0E0","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamil s":[],"data":{"alignment":"left"}},{"key":"5q2qa","text":"Project Description: This paper is the individual, written portion of a larger Linked Open Data (LOD) project. I was a part of a four person group to research and ultimately explain and present case studies of LOD to our class. I presented briefly on LOD for comic books based on this paper, where I was able to expound upon existing ontologies and frameworks for encoding comic books as well as encourage their use in libraries and academic fields. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":450,"style":"FONT_NAME_Merriweather"},{"offset":0,"length":19,"style":"BOLD"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":0,"h":276,"w":12,"minH":276,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Helvetica","fontSize":19,"color":"#E0E0E0","textAlign":"left","name":{"fontSize":40},"padding":35,"header-one":{"fontFamily":"","fontSize":36,"color":"","textAlign":"","padding":0},"blockquote":{"fontFamily":"","fontSize":"","color":"","textAlign":"","padding":35,"blockquoteStyle":"quoteBar"},"equation":{"fontSize":"","color":"","borderColor":"","backgroundColor":"","padding":0},"link":{"fontFamily":"","fontSize":"","color":"#337ab7","padding":0,"textDecoration":""},"linkHover":{"color":"#337ab7"},"bulletList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"disc","padding":0},"numberList":{"fontFamily":"","fontSize":"","color":"","textAlign":"","listStyleType":"decimal","padding":0},"backgroundColor":{"backgroundColor":"#212121","opacity":1},"backgroundImage":{"backgroundSize":"cover","backgroundAttachment":"fixed","opacity":1}},"classes":[]},{"id":286563387,"sourceId":0,"pageId":77619786,"slideId":91240490,"type":"richtxt","isDraft":false,"name":null,"order":0,"isHidden":false,"content":{"draftjs-0":{"json":{"blocks":[{"key":"87jmb","text":"Methodology: This work was inspired by my lifelong interest in and familiarity with comic books. I have noticed more and more academic libraries starting and growing their comic book collections and want to encourage that growth via the semantic web. My first mission was to see if LOD existed for comic books’ unique structure. Sean Petiya’s 2023 paper on LOD used to describe comic book sequences was one of my first entry points. I looked through Petiya’s references to find books and papers on the history of comic books, artistic and storytelling significance of sequential art, and more ontologies that are written or include vocabulary for comic books. I expanded my research further by looking for studies and projects that described further methods for linking and compiling existing metadata and filling in missing data. To better describe how Petiya’s Comic Book Ontology (CBO) encodes comic book elements as well as showcase the elements described, I recreated the CBO Sequence model from his paper using an excerpt from a comic in the public domain. I assumed my reader is not entirely familiar with comic books but already familiar with LOD methods. Ultimately, my goal was to assert that comic books can serve as a scholarly resource and their unique structure can be described by LOD. I encourage institutions and LOD community members to initiate and support projects to further link comic book metadata. ","type":"unstyled","depth":0,"inlineStyleRanges":[{"offset":0,"length":11,"style":"BOLD"}],"entityRanges":[],"data":{}}],"entityMap":{}}}},"position":{"x":0,"y":1164,"h":477,"w":12,"autoHeight":true,"enableMinHeight":true,"version":"v2"},"prompt":{},"settings":{"displayName":false,"displayPrompt":false,"instructional":false,"metaData":{},"private":false,"tags":[]},"styles":{"version":"v2","fontFamily":"Merriweather","fontSize":19,"color":"#E0E0E0","textAlign":"left","name":{"fontSize":40},"padding":35,"hea
